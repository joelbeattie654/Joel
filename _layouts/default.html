<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} — Joel's Space</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4efe3;
            --card-bg: #ffffff;
            --text: #1b2a41;
            --accent: #b23a2e;
            --border: #1b2a41;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            /* Matching blueprint background grid from homepage */
            background-image: 
                linear-gradient(rgba(27,42,65,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(27,42,65,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ---------- Universal Navigation Header ---------- */
        .joel-space-header {
            background: #1b2a41;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #111827;
            position: sticky;
            top: 0;
            z-index: 99999;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            box-sizing: border-box;
        }
        .joel-space-logo {
            color: #ffffff;
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .joel-space-logo span {
            color: var(--accent);
        }
        .joel-space-back-btn {
            color: #f4efe3;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.08);
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s ease;
        }
        .joel-space-back-btn:hover { 
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        /* ---------- Modern Project Article Wrapper ---------- */
        .project-container {
            max-width: 800px;
            width: 100%;
            margin: 50px auto 80px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .project-card {
            background: var(--card-bg);
            border: 3px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 8px 8px 0px var(--border);
        }

        .project-title {
            font-family: 'Fraunces', serif;
            font-size: clamp(2.2rem, 5vw, 3rem);
            font-weight: 800;
            margin: 0 0 10px 0;
            line-height: 1.1;
        }

        .project-description-tag {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
            border-bottom: 2px dashed rgba(27,42,65,0.15);
            padding-bottom: 15px;
        }

        /* Stylizes the text content input from markdown */
        .project-content {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #2c3e50;
        }

        .project-content p {
            margin: 0 0 20px 0;
        }

        /* Custom stylish link upgrade */
        .project-content a {
            display: inline-block;
            color: #ffffff;
            background: var(--border);
            text-decoration: none;
            font-weight: 700;
            padding: 10px 18px;
            border-radius: 8px;
            transition: all 0.2s ease;
            margin-top: 10px;
            border: 2px solid var(--border);
        }

        .project-content a:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="joel-space-header no-print">
        <div class="joel-space-logo">Joel's <span>Space</span></div>
        <div style="display: flex; gap: 10px;">
            <a href="{{ '/shop/' | relative_url }}" class="joel-space-back-btn" style="background: var(--accent); border-color: var(--accent);">🛒 Shop</a>
            <a href="{{ '/' | relative_url }}" class="joel-space-back-btn">← Back Home</a>
        </div>
    </div>

    <!-- The template captures the markdown data and places it cleanly inside here -->
    <div class="project-container">
        <article class="project-card">
            <h1 class="project-title">{{ page.title }}</h1>
            <div class="project-description-tag">{{ page.description }}</div>
            <div class="project-content">
                {{ content }}
            </div>
        </article>
    </div>

</body>
</html>
