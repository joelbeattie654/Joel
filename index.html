---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joel Space</title>
    <style>
        :root {
            --bg: #f4efe3;
            --card-bg: #ffffff;
            --text: #1b2a41;
            --accent: #b23a2e;
            --border: rgba(27,42,65,0.16);
        }
        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            border-bottom: 3px solid var(--text);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 3rem;
            margin: 0;
        }
        .subtitle {
            font-size: 1.1rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .card {
            background: var(--card-bg);
            border: 2px solid var(--text);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 6px 6px 0px var(--text);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px var(--text);
        }
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
        }
        .card p {
            margin: 0 0 20px 0;
            color: #5b6577;
            font-size: 0.95rem;
            line-height: 1.4;
            flex-grow: 1;
        }
        .btn {
            display: inline-block;
            background: var(--text);
            color: var(--bg);
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: bold;
            text-align: center;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Joel Space</h1>
            <div class="subtitle">Creative Portfolio & Interactive Apps</div>
        </header>

        <main class="grid">
            {% for project in site.projects %}
            <div class="card">
                <div>
                    <h3>{{ project.title }}</h3>
                    <p>{{ project.description }}</p>
                </div>
                <a href="{{ project.url | relative_url }}" class="btn">Launch Project →</a>
            </div>
            {% endfor %}
        </main>
    </div>
</body>
</html>
